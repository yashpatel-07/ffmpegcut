name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: false
        default: "v0.1.0"
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', '.github/workflows/release.yml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Decode macOS sidecar binaries
        env:
          FFMPEG_AARCH64_B64: ${{ secrets.FFMPEG_MACOS_AARCH64_B64 }}
          FFPROBE_AARCH64_B64: ${{ secrets.FFPROBE_MACOS_AARCH64_B64 }}
        run: |
          set -euo pipefail
          printf '%s' "$FFMPEG_AARCH64_B64"  | base64 --decode > src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          printf '%s' "$FFPROBE_AARCH64_B64" | base64 --decode > src-tauri/binaries/ffprobe-aarch64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-* src-tauri/binaries/ffprobe-*

      - name: Verify decoded sidecar binaries
        run: |
          set -euo pipefail
          for binary in \
            src-tauri/binaries/ffmpeg-aarch64-apple-darwin \
            src-tauri/binaries/ffprobe-aarch64-apple-darwin
          do
            test -s "$binary"
            file "$binary" | grep -q 'arm64'
          done

      - name: Build aarch64 macOS bundle
        run: bun run tauri build

      - name: Verify packaged app includes sidecars
        run: |
          set -euo pipefail
          for binary in \
            src-tauri/target/release/bundle/macos/ffmpegcut.app/Contents/MacOS/ffmpeg \
            src-tauri/target/release/bundle/macos/ffmpegcut.app/Contents/MacOS/ffprobe
          do
            test -s "$binary"
            file "$binary" | grep -q 'arm64'
          done

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpegcut-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ffmpegcut-macos-dmg
          path: dist

      - name: Create release and attach DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease == 'true' }}
          generate_release_notes: true
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
